cat <<'YAML' > .github/workflows/publish-report.yml
name: Nightly Build & Publish Stocks Analytics Report

permissions:
  contents: write

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate report
        run: |
          node visualizer.js
          ls -lh data/report.html

      - name: Stash report artifact
        run: |
          mkdir -p /tmp/report
          cp data/report.html /tmp/report/report.html

      - name: Checkout gh-pages branch
        run: |
          git checkout gh-pages || git checkout --orphan gh-pages

      - name: Clean gh-pages root
        run: |
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

      - name: Publish report
        run: |
          cp /tmp/report/report.html index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Nightly publish analytics report" || echo "No changes to commit"
          git push origin gh-pages
YAML